<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDM - Team Twitch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/wolf-logo.png" alt="Logo RDM" onerror="this.style.display='none'">
      <span>RDM</span>
    </div>

    <nav>
      <a href="#accueil">Accueil</a>
      <a href="#equipe">Équipe</a>
      <a href="#clips">Clips</a>
      <a href="#stats">Stats</a>
      <a href="#contact">Contact</a>
    </nav>

    <a class="twitch-btn" href="https://www.twitch.tv/" target="_blank" rel="noopener">Twitch</a>
  </header>

  <main>
    <section id="accueil" class="hero">
      <h1>Team RDM</h1>
      <p>Publie et regarde les clips Twitch de la team.</p>
    </section>

    <section id="clips" class="panel">
      <h2>📤 Publier un clip Twitch</h2>
      <p>Entre ton pseudo Twitch, un titre, le lien du clip et le code membre.</p>

      <form id="clipForm" class="clip-form">
        <input id="pseudo" type="text" placeholder="Ton pseudo Twitch" required />
        <input id="title" type="text" placeholder="Titre du clip" required />
        <input id="clipUrl" type="url" placeholder="Lien du clip Twitch" required />
        <input id="memberCode" type="password" placeholder="Code membre" required />
        <button type="submit">Publier le clip</button>
      </form>

      <p id="firebaseStatus" class="status">État Firebase : chargement...</p>
      <p id="message" class="message"></p>
    </section>

    <section class="clips-section">
      <h2>🎬 Clips de la team</h2>
      <div id="clipsGrid" class="clips-grid"></div>
    </section>
  </main>

  <footer>
    © RDM - Site Twitch
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
